<!DOCTYPE html>
<html>
<head>
    <title>Product Page - E-commerce Demo</title>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 800px; margin: 0 auto; }
        .product { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .buy-btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .buy-btn:hover { background: #218838; }
        img { max-width: 100%; height: 200px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>🛍️ Product Page</h1>
    <div class="product">
        <img src="" alt="Product Image">
        <h2>Premium Wireless Headphones</h2>
        <p>High-quality sound with noise cancellation. Perfect for music lovers!</p>
        <h3>$199.99</h3>
        <button class="buy-btn">Add to Cart</button>
        <button class="buy-btn" style="background: #007bff;">Buy Now</button>
    </div>
    
    <script src="tracker.js"></script>
</body>
</html>
