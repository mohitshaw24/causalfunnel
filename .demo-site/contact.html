<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Business Site</title>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .submit-btn { background: #6c757d; color: white; padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📞 Contact Us</h1>
    <form>
        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="How can we help?"></textarea>
        </div>
        <button type="button" class="submit-btn">Send Message</button>
    </form>
    
    <script src="tracker.js"></script>
</body>
</html>
